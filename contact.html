<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SISU Data | Contact</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
  <div class="logo">SISU DATA</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="services.html">Services</a>
    <a href="about.html">About</a>
    <a href="cases.html">Case Studies</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<main class="main">
  <section class="section">
    <h2>Let’s build something durable</h2>
    <p>
      Share a bit about your data challenges and goals. SISU Data will respond within one business day.
    </p>
  </section>

  <section class="section">
    <form>
      <div class="field">
        <label for="name">Full Name</label>
        <input id="name" type="text" name="name" required>
      </div>

      <div class="field">
        <label for="email">Email Address</label>
        <input id="email" type="email" name="email" required>
      </div>

      <div class="field">
        <label for="company">Company</label>
        <input id="company" type="text" name="company">
      </div>

      <div class="field">
        <label for="message">What do you need help with?</label>
        <textarea id="message" name="message" required></textarea>
      </div>

      <button class="btn-primary" type="submit">Submit</button>
    </form>
  </section>
</main>

<footer>
  <p>SISU Data. Ready when you are.</p>
</footer>
</body>
</html>
