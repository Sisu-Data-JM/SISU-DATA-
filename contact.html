<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SISU Data | Contact</title>
  <link rel="stylesheet" href="styles.css">

  <!-- EmailJS SDK -->
  <script src="https://cdn.emailjs.com/sdk/3.2/email.min.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      emailjs.init("TNupq0IeY3Cskfc0A"); // <-- Replace with your EmailJS Public Key
    });

    function sendEmail(e) {
      e.preventDefault();

      emailjs.sendForm("service_5j5ucns", "template_7a0oiw2", "#contact-form")
        .then(() => {
          alert("Thank you! Your message has been sent.");
          document.getElementById("contact-form").reset();
        })
        .catch((error) => {
          console.error("EmailJS Error:", error);
          alert("Oops! Something went wrong. Please try again.");
        });
    }
  </script>
</head>

<body>

<header>
  <div class="logo-stack">
    <span class="logo-sisu">SISU</span>
    <span class="logo-data">DA<span class="cross">†</span>A</span>
  </div>
  <nav>
    <a href="index.html">Home</a>
    <a href="services.html">Services</a>
    <a href="about.html">About</a>
    <a href="academy.html">Academy</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<main class="main">

  <section class="section">
    <h2>Let’s build something durable</h2>
    <p>Share a bit about your data challenges and goals. SISU Data will respond within one business day.</p>
  </section>

  <section class="section">
    <form id="contact-form" onsubmit="sendEmail(event)">

      <div class="field">
        <label for="name">Full Name</label>
        <input id="name" type="text" name="name" required>
      </div>

      <div class="field">
        <label for="email">Email Address</label>
        <input id="email" type="email" name="email" required>
      </div>

      <div class="field">
        <label for="company">Company</label>
        <input id="company" type="text" name="company">
      </div>

      <div class="field">
        <label for="topic">Inquiry Type</label>
        <select id="topic" name="topic" required>
          <option value="Services">Services</option>
          <option value="SISU Data Academy">SISU Data Academy</option>
        </select>
      </div>

      <div class="field">
        <label for="message">What do you need help with?</label>
        <textarea id="message" name="message" required></textarea>
      </div>

      <button class="btn-primary" type="submit">Submit</button>
    </form>
  </section>

</main>

<footer class="site-footer">
  <div class="footer-left">© 2026 Sisu-Data.com - All rights reserved</div>
  <div class="footer-center">SISU Data. Ready when you are.</div>
</footer>

</body>
</html>
